spring.application.name=finance-dashboard

# Server Configuration - Accessible from Anywhere
server.address=0.0.0.0
server.port=8080
server.servlet.context-path=/api

# Database Configuration (H2 Embedded - No External DB Needed!)
spring.datasource.url=jdbc:h2:mem:financedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (optional - for debugging)
spring.h2.console.enabled=false

# JPA Configuration

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT Configuration
jwt.secret=finance_dashboard_jwt_secret_key_this_must_be_at_least_64_characters_long_for_hs512_algorithm
jwt.expiration=86400000
